# .github/workflows/ci.yml
name: CI

on:
  pull_request:

jobs:
  test:
    name: Build + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-26.04
          - os: windows-2025-vs2026
          - os: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel Cython cmake pytest

      - name: Build and install cykit
        run: pip install -e . -v

      - name: Run test suite
        run: pytest tests/ -v